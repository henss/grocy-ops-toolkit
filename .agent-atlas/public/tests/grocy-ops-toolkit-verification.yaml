id: test-scope:grocy-ops-toolkit-verification
kind: test-scope
title: grocy-ops-toolkit Verification
summary: Narrow default verification commands for repo-local changes; prefer more specific tests when the task identifies them.
status: active
visibility: public
commands:
  - command: npm run verify:session
    cwd: .
    purpose: Repo-local verification candidate.
  - command: npm test
    cwd: .
    purpose: Repo-local verification candidate.
  - command: npm run build
    cwd: .
    purpose: Repo-local verification candidate.
  - command: npm run typecheck
    cwd: .
    purpose: Repo-local verification candidate.
relations:
  - type: verifies
    target: component:grocy-ops-toolkit-source
